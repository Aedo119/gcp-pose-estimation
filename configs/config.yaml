# Configuration for GCP Pose Estimation training and inference.
# Paths are Colab defaults — patch in-notebook via Cell 3 before running.

data:
  data_root: "/content/drive/MyDrive/GCP_Assignment_Datasets/train_dataset"
  labels_path: "/content/drive/MyDrive/GCP_Assignment_Datasets/train_dataset/gcp_marks.json"
  test_data_root: "/content/drive/MyDrive/GCP_Assignment_Datasets/test_dataset"
  val_fraction: 0.15
  split_seed: 42

model:
  backbone: "resnet18"      # resnet18 | resnet34 | resnet50
  pretrained: true
  num_shape_classes: 3
  head_hidden_dim: 128
  dropout: 0.2

train:
  batch_size: 32
  num_epochs: 30
  lr: 1.0e-4
  weight_decay: 1.0e-4
  # jitter_frac applied to BOTH train (randomly) and val (deterministically)
  # so val PCK is a meaningful localization metric (DECISION_LOG entry 12).
  jitter_frac: 0.2
  kp_loss_weight: 5.0
  use_class_weights: true
  num_workers: 2
  early_stopping_patience: 7
  checkpoint_dir: "/content/checkpoints"
  log_every_n_steps: 20

inference:
  checkpoint_path: "/content/checkpoints/best_model.pt"
  output_path: "/content/predictions.json"
  batch_size: 32
  num_workers: 2
  # Sliding-window stride in native pixels.
  # 300 = 50% overlap (recommended, more accurate).
  # 600 = non-overlapping (faster, less accurate).
  window_stride: 300
  # Remap "L-Shape" -> "L-Shaped" to match assignment spec example string.
  # Leave false to stay consistent with dataset label strings.
  remap_lshape_to_lshaped: false