# Configuration for GCP Pose Estimation training and inference.
# Paths below are Colab defaults (Google Drive mount) — override as needed
# for local runs.

data:
  data_root: "/content/drive/MyDrive/GCP_Assignment_Datasets/train_dataset"
  labels_path: "/content/drive/MyDrive/GCP_Assignment_Datasets/train_dataset/gcp_marks.json"
  test_data_root: "/content/drive/MyDrive/GCP_Assignment_Datasets/test_dataset"
  val_fraction: 0.15
  split_seed: 42

model:
  backbone: "resnet18"     # one of: resnet18, resnet34, resnet50
  pretrained: true
  num_shape_classes: 3
  head_hidden_dim: 128
  dropout: 0.2

train:
  batch_size: 32
  num_epochs: 30
  lr: 1.0e-4
  weight_decay: 1.0e-4
  jitter_frac: 0.1          # crop-center jitter as fraction of CROP_HALF (see DECISION_LOG entry 11)
  kp_loss_weight: 5.0        # relative weight of keypoint regression loss vs classification loss
  use_class_weights: true    # inverse-frequency class weighting for classification loss (DECISION_LOG entry 7)
  num_workers: 2
  early_stopping_patience: 7 # epochs with no val-loss improvement before stopping
  checkpoint_dir: "/content/drive/MyDrive/GCP_Assignment_Datasets/checkpoints"
  log_every_n_steps: 20

inference:
  checkpoint_path: "/content/drive/MyDrive/GCP_Assignment_Datasets/checkpoints/best_model.pt"
  output_path: "predictions.json"
  batch_size: 32
  num_workers: 2
  # Sliding-window stride (native pixels). Default = CROP_SIZE (600) for
  # non-overlapping windows (fastest). Reduce (e.g. 300) for overlapping
  # windows / higher accuracy at higher compute cost. See src/inference.py
  # module docstring for rationale.
  window_stride: 600
  # If true, remaps "L-Shape" -> "L-Shaped" in predictions.json output to
  # match the assignment spec's example label string (DECISION_LOG.md,
  # Open Items). Leave false to keep predictions consistent with the
  # dataset's own training label strings.
  remap_lshape_to_lshaped: false

# Geometry / preprocessing constants are defined in src/utils.py:
#   CROP_HALF = 300, MODEL_INPUT_SIZE = 224
# Change there if you need to experiment with crop size (see DECISION_LOG
# entry 9 for rationale on the chosen values).