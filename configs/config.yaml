# Configuration for GCP Pose Estimation training and inference.
# Paths are Colab defaults — patch in-notebook via Cell 3 before running.

data:
  data_root: "/content/drive/MyDrive/GCP_Assignment_Datasets/train_dataset"
  labels_path: "/content/drive/MyDrive/GCP_Assignment_Datasets/train_dataset/gcp_marks.json"
  test_data_root: "/content/drive/MyDrive/GCP_Assignment_Datasets/test_dataset"
  val_fraction: 0.15
  split_seed: 42

model:
  backbone: "resnet18"      # resnet18 | resnet34 | resnet50
  pretrained: true
  num_shape_classes: 3
  head_hidden_dim: 128
  dropout: 0.2

train:
  batch_size: 32
  num_epochs: 30
  lr: 1.0e-4
  weight_decay: 1.0e-4
  # marker_margin: min distance (native px) from marker to crop edge.
  # Controls how far off-center the marker can appear in a training crop.
  # Default 20px keeps the marker visible while covering the full range
  # of positions seen during sliding-window inference (DECISION_LOG entry 14).
  marker_margin: 20
  kp_loss_weight: 5.0
  use_class_weights: true
  num_workers: 2
  early_stopping_patience: 7
  checkpoint_dir: "/content/checkpoints"
  log_every_n_steps: 20

inference:
  checkpoint_path: "/content/checkpoints/best_model.pt"
  output_path: "/content/predictions.json"
  batch_size: 64
  num_workers: 2
  # Fine stride (150px) gives ~530 windows per 4096x2730 image — ensures
  # at least one window has the marker well within frame (DECISION_LOG entry 14).
  # Increase to 300 or 600 for faster (less accurate) inference.
  window_stride: 150
  remap_lshape_to_lshaped: false